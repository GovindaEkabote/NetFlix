spring:
  application:
    name: stream-service

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: streaming-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring:
          json:
            trusted:
              packages: "*"
            use:
              type:
                headers: false
            value:
              default:
                type: com.netflix.event.VideoEncodedEvent

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: password123
  bucket: netflix-videos
  presignedUrlExpire: 30

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info