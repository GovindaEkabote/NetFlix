server:
  port: 8085

spring:
  application:
    name: ai_search_service

  datasource:
    url: jdbc:mysql://localhost:3306/movie_scenes
    username: root
    password: Govinda@1997
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        model: nomic-embed-text
      chat:
        model: llama3.2

    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        collection-name: movie-scenes
        initialize-schema: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: video.encoded.group.v2
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        spring.json.trusted.packages: "*"

        spring.json.value.default.type: ai_search_service.event.VideoEncodedEvent

        spring.json.use.type.headers: false

minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: password123
  bucket: netflix-videos